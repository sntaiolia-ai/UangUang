<body class="bg-brand-bgLight text-brand-textDark font-sans antialiased overflow-hidden">

    <div id="app" class="min-h-screen flex overflow-hidden"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
    // --- INTEGRASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDSvZ7i-GZQjNP9r02oOFn38Mr0sGTp46Q",
        authDomain: "uanguang-c7a10.firebaseapp.com",
        projectId: "uanguang-c7a10",
        storageBucket: "uanguang-c7a10.firebasestorage.app",
        messagingSenderId: "651490267003",
        appId: "1:651490267003:web:4e730fe905d3f3bdc7b7de"
    };
    
    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- STREAMING_CHUNK: Initializing pristine clean state... ---
    let state = {
        activeMenu: 'dashboard', 

        // Data murni sinkron dengan Firebase
        wallets: [],
        transactions: [],
        goals: [],
        debts: [],
        
        selectedWalletId: null,
        selectedTransactionId: null, 
        activeSubcategoryMenuId: null, 
        
        // Filter Pencarian
        transactionSearch: '',
        filterTime: 'Semua Waktu',
        filterWallet: 'Semua Dompet',
        filterType: 'Semua Tipe',
        filterCategory: 'Semua Subkategori',

        // Kategori Default
        categoriesExpense: ['F&B', 'Grocery', 'Tagihan', 'Kuota', 'Transportasi', 'Iuran', 'Jajan', 'Online Shopping', 'Pet', 'Kebutuhan Anak', 'Lain-lain'],
        sourcesIncome: ['Gaji', 'Tukin', 'Uang Makan', 'Uang Dinas', 'Lain-lain'],
        savingTargets: ['Tabungan', 'Deposito', 'Reksadana', 'Obligasi', 'Saham', 'SBN'],

        categoryEmojis: {
            'F&B': '🍔', 'Grocery': '🛒', 'Tagihan': '💵', 'Kuota': '📱', 'Transportasi': '🚗',
            'Iuran': '🤝', 'Jajan': '🍦', 'Online Shopping': '🛍️', 'Pet': '🐱', 'Kebutuhan Anak': '🍼',
            'Lain-lain': '📦', 'Gaji': '💰', 'Tukin': '💸', 'Uang Makan': '🍱', 'Uang Dinas': '✈️',
            'Tabungan': '🐷', 'Deposito': '🏦', 'Reksadana': '📈', 'Obligasi': '📝', 'Saham': '📊', 'SBN': '🏛️'
        },

        budget: {
            incomeEstimate: 0, 
            selectedMonth: '2026-07', 
            kebutuhanPct: 50, 
            keinginanPct: 30, 
            tabunganPct: 20,  
            subcategories: [] 
        },

        // Modal Wizard states
        modal: { show: false, mode: 'add', walletId: null },
        txModal: { show: false, activeTab: 'Pengeluaran', editMode: false, txId: null, linkToGoal: false, linkedGoalId: '' },
        bulkModal: { show: false, rows: [] },
        budgetModal: { show: false, mode: 'estimate' },
        tempBudgetModal: { kebutuhanPct: 50, keinginanPct: 30, tabunganPct: 20, selectedParentCategory: 'kebutuhan', editingSubId: null, editingSubName: '', editingSubLimit: 0 },
        
        goalModal: { show: false, mode: 'add', goalId: null },
        goalDetailId: null,

        debtModal: { show: false, mode: 'add', type: 'utang', debtId: null },

        confirmDialog: { show: false, title: '', message: '', actionType: '', targetId: null, extraId: null },
        toastMessage: null
    };

    // --- FUNGSI UTAMA SINKRONISASI FIREBASE ---
    // Fungsi pembantu untuk menyimpan data gabungan state keuangan ke Firebase secara berkala
    function saveStateToFirebase() {
        db.ref('financial_data').set({
            wallets: state.wallets,
            transactions: state.transactions,
            goals: state.goals,
            debts: state.debts,
            budget: state.budget
        });
    }

    // Mengambil data dari Firebase saat aplikasi pertama kali dimuat
    function initFirebaseSync() {
        db.ref('financial_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state.wallets = data.wallets || [];
                state.transactions = data.transactions || [];
                state.goals = data.goals || [];
                state.debts = data.debts || [];
                state.budget = data.budget || state.budget;
            }
            render(); // me-render ulang UI setiap kali ada perubahan data di Firebase
        });
    }

    // --- STREAMING_CHUNK: Formatting & UI Helpers... ---
    const formatRp = (num) => {
        const isNegative = num < 0;
        const absVal = Math.abs(num);
        const formatted = new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0
        }).format(absVal);
        return (isNegative ? '-' : '') + formatted.replace("Rp", "Rp ").trim();
    };

    function showToast(message) {
        state.toastMessage = message;
        render();
        setTimeout(() => {
            state.toastMessage = null;
            render();
        }, 3000);
    }

    function getGoalEmojiByName(name) {
        const lowerName = name.toLowerCase();
        if (lowerName.includes('darurat') || lowerName.includes('emergency')) return '🚨';
        if (lowerName.includes('jogja') || lowerName.includes('jalan') || lowerName.includes('travel') || lowerName.includes('liburan') || lowerName.includes('bali')) return '🌲';
        if (lowerName.includes('mama') || lowerName.includes('ibu') || lowerName.includes('kado') || lowerName.includes('istri')) return '👩';
        if (lowerName.includes('sepeda') || lowerName.includes('motor')) return '🚲';
        if (lowerName.includes('emas') || lowerName.includes('logam') || lowerName.includes('gold')) return '🏅';
        if (lowerName.includes('rumah') || lowerName.includes('apartemen') || lowerName.includes('properti')) return '🏠';
        return '🎯';
    }

    document.addEventListener('click', () => {
        if (state.activeSubcategoryMenuId) {
            state.activeSubcategoryMenuId = null;
            render();
        }
    });

    window.switchMenu = function(menuId) {
        state.activeMenu = menuId;
        render();
    };

    // --- STREAMING_CHUNK: Dompet / Wallet Logic... ---
    window.toggleWalletExpand = function(id) {
        state.selectedWalletId = (state.selectedWalletId === id) ? null : id;
        render();
    };

    window.updateLastCheck = function(id, val, e) {
        e.stopPropagation();
        const wallet = state.wallets.find(w => w.id === id);
        if (wallet) {
            wallet.lastCheck = val;
            saveStateToFirebase();
            showToast(`Tanggal Last Check "${wallet.name}" diperbarui!`);
        }
    };

    window.triggerDeleteWallet = function(id, e) {
        e.stopPropagation();
        const wallet = state.wallets.find(w => w.id === id);
        if (wallet) {
            state.confirmDialog = {
                show: true, title: 'Hapus Dompet',
                message: `Apakah Anda yakin ingin menghapus dompet "${wallet.name}"? Semua data terkait akan terhapus.`,
                actionType: 'deleteWallet', targetId: id
            };
            render();
        }
    };

    window.openModal = function(mode, id = null, e = null) {
        if (e) e.stopPropagation();
        state.modal = { show: true, mode, walletId: id };
        render();

        if (mode === 'edit' && id) {
            const w = state.wallets.find(x => x.id === id);
            if (w) {
                document.getElementById('m-type').value = w.type;
                document.getElementById('m-name').value = w.name;
                document.getElementById('m-bal').value = Math.abs(w.balance);
                document.getElementById('m-acc').value = w.accountNumber || '';
                window.handleModalTypeChange(w.type);

                if (w.type === 'Bank') {
                    document.getElementById('m-res-n').value = w.reserveName || '';
                    document.getElementById('m-res-v').value = w.reserveAmount || '';
                } else if (w.type === 'Kartu Kredit' || w.type === 'PayLater') {
                    document.getElementById('m-lim').value = w.limit || '';
                    document.getElementById('m-due').value = w.dueDate || '';
                }
            }
        } else {
            window.handleModalTypeChange('Bank');
        }
    };

    window.closeModal = function() {
        state.modal.show = false;
        render();
    };

    window.handleModalTypeChange = function(selectedType) {
        const bankFields = document.getElementById('modal-bank-only-fields');
        const creditFields = document.getElementById('modal-credit-only-fields');
        
        if (selectedType === 'Bank') {
            if (bankFields) bankFields.classList.remove('hidden');
            if (creditFields) creditFields.classList.add('hidden');
        } else if (selectedType === 'Kartu Kredit' || selectedType === 'PayLater') {
            if (bankFields) bankFields.classList.add('hidden');
            if (creditFields) creditFields.classList.remove('hidden');
        } else {
            if (bankFields) bankFields.classList.add('hidden');
            if (creditFields) creditFields.classList.add('hidden');
        }
    };

    window.saveWallet = function(e) {
        e.preventDefault();
        const type = document.getElementById('m-type').value;
        let bal = parseFloat(document.getElementById('m-bal').value) || 0;
        
        if (type === 'Kartu Kredit' || type === 'PayLater') {
            bal = -Math.abs(bal);
        }

        const data = {
            type: type,
            name: document.getElementById('m-name').value.trim(),
            balance: bal,
            accountNumber: document.getElementById('m-acc').value.trim(),
            lastCheck: new Date().toISOString().split('T')[0]
        };

        if (type === 'Bank') {
            data.reserveName = document.getElementById('m-res-n').value.trim();
            data.reserveAmount = parseFloat(document.getElementById('m-res-v').value) || 0;
            data.limit = 0; data.dueDate = '';
        } else if (type === 'Kartu Kredit' || type === 'PayLater') {
            data.limit = parseFloat(document.getElementById('m-lim').value) || 0;
            data.dueDate = document.getElementById('m-due').value.trim();
            data.reserveName = ''; data.reserveAmount = 0;
        } else {
            data.reserveName = ''; data.reserveAmount = 0; data.limit = 0; data.dueDate = '';
        }

        if (state.modal.mode === 'add') {
            data.id = 'w_' + Date.now();
            state.wallets.push(data);
            showToast(`Dompet "${data.name}" berhasil ditambahkan!`);
        } else {
            const idx = state.wallets.findIndex(x => x.id === state.modal.walletId);
            if (idx !== -1) {
                state.wallets[idx] = { ...state.wallets[idx], ...data };
                showToast(`Detail dompet "${data.name}" diperbarui!`);
            }
        }
        
        saveStateToFirebase();
        state.modal.show = false;
        render();
    };

    window.cancelConfirm = function() {
        state.confirmDialog.show = false;
        render();
    };

    window.executeConfirm = function() {
        const { actionType, targetId } = state.confirmDialog;
        
        if (actionType === 'deleteWallet') {
            state.wallets = state.wallets.filter(w => w.id !== targetId);
            state.selectedWalletId = null;
            showToast('Dompet berhasil dihapus.');
        } else if (actionType === 'deleteTx') {
            const tx = state.transactions.find(t => t.id === targetId);
            if (tx) revertTransactionImpact(tx);
            state.transactions = state.transactions.filter(t => t.id !== targetId);
            state.selectedTransactionId = null;
            showToast('Transaksi berhasil dihapus.');
        } else if (actionType === 'deleteSub') {
            state.budget.subcategories = state.budget.subcategories.filter(s => s.id !== targetId);
            showToast('Subkategori anggaran berhasil dihapus.');
        } else if (actionType === 'deleteGoal') {
            state.goals = state.goals.filter(g => g.id !== targetId);
            state.goalDetailId = null;
            showToast('Goal berhasil dihapus.');
        } else if (actionType === 'deleteDebt') {
            state.debts = state.debts.filter(d => d.id !== targetId);
            showToast('Catatan utang/piutang berhasil dihapus.');
        }
        
        saveStateToFirebase();
        state.confirmDialog.show = false;
        render();
    };

    // --- STREAMING_CHUNK: Transaction balance calculations... ---
    function applyTransactionImpact(tx) {
        if (tx.type === 'Pengeluaran') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance -= tx.amount;
        } else if (tx.type === 'Pemasukan') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance += tx.amount;
        } else if (tx.type === 'Transfer' || tx.type === 'Tabungan') {
            const wFrom = state.wallets.find(x => x.id === tx.walletId);
            const wTo = state.wallets.find(x => x.id === tx.toWalletId);
            if (wFrom) wFrom.balance -= tx.amount;
            if (wTo) wTo.balance += tx.amount;
            if (tx.fee && wFrom) wFrom.balance -= tx.fee;

            if (tx.type === 'Tabungan' && tx.linkedGoalId) {
                const goal = state.goals.find(g => g.id === tx.linkedGoalId);
                if (goal && !goal.isLocked) {
                    goal.current += tx.amount;
                }
            }
        }
    }

    function revertTransactionImpact(tx) {
        if (tx.type === 'Pengeluaran') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance += tx.amount;
        } else if (tx.type === 'Pemasukan') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance -= tx.amount;
        } else if (tx.type === 'Transfer' || tx.type === 'Tabungan') {
            const wFrom = state.wallets.find(x => x.id === tx.walletId);
            const wTo = state.wallets.find(x => x.id === tx.toWalletId);
            if (wFrom) wFrom.balance += tx.amount;
            if (wTo) wTo.balance -= tx.amount;
            if (tx.fee && wFrom) wFrom.balance += tx.fee;

            if (tx.type === 'Tabungan' && tx.linkedGoalId) {
                const goal = state.goals.find(g => g.id === tx.linkedGoalId);
                if (goal) goal.current = Math.max(0, goal.current - tx.amount);
            }
        }
    }

    window.handleToWalletChangeDirect = function(selectedToWalletId) {
        const container = document.getElementById('linked-goal-select-container');
        if (!container) return;

        const matchingGoals = state.goals.filter(g => g.walletId === selectedToWalletId);

        if (matchingGoals.length === 0) {
            container.innerHTML = `
                <p class="text-xs text-red-500 italic mt-2 text-center bg-red-50 py-2 rounded-xl border border-red-100 font-semibold">
                    Tidak ada goal aktif untuk dompet ini
                </p>
            `;
        } else {
            container.innerHTML = `
                <label class="text-[10px] font-bold tracking-wider text-brand-textMuted block mb-1">TAUTKAN KE TARGET GOAL</label>
                <select 
                    id="tx-linked-goal-id" required
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none cursor-pointer font-semibold"
                >
                    ${matchingGoals.map(g => `<option value="${g.id}" ${state.txModal.linkedGoalId === g.id ? 'selected' : ''}>${g.emoji} ${g.name} (${formatRp(g.current)} / ${formatRp(g.target)})</option>`).join('')}
                </select>
            `;
        }
    };

    window.handleLinkGoalToggleDirect = function(checked) {
        state.txModal.linkToGoal = checked;
        const wrapper = document.getElementById('tx-linked-goal-wrapper');
        if (!wrapper) return;

        if (checked) {
            wrapper.classList.remove('hidden');
            const targetWalletInput = document.getElementById('tx-to-wallet-tab');
            if (targetWalletInput) {
                window.handleToWalletChangeDirect(targetWalletInput.value);
            }
        } else {
            wrapper.classList.add('hidden');
        }
    };

    // --- STREAMING_CHUNK: Tx Modals Wizard... ---
    window.openTxModal = function(type = 'Pengeluaran', editId = null) {
        state.txModal = {
            show: true, activeTab: type, editMode: !!editId, txId: editId,
            linkToGoal: false, linkedGoalId: ''
        };
        render();

        const todayStr = new Date().toISOString().split('T')[0];
        if (document.getElementById('tx-date')) {
            document.getElementById('tx-date').value = todayStr;
        }

        if (editId) {
            const tx = state.transactions.find(t => t.id === editId);
            if (tx) {
                state.txModal.activeTab = tx.type;
                state.txModal.linkToGoal = !!tx.linkedGoalId;
                state.txModal.linkedGoalId = tx.linkedGoalId || '';
                render(); 
                document.getElementById('tx-date').value = tx.date;
                document.getElementById('tx-amount').value = tx.amount;
                document.getElementById('tx-wallet').value = tx.walletId;
                document.getElementById('tx-notes').value = tx.notes || '';
                
                if (tx.type === 'Pengeluaran') {
                    document.getElementById('tx-cat-exp').value = tx.category;
                } else if (tx.type === 'Pemasukan') {
                    document.getElementById('tx-source').value = tx.category;
                } else if (tx.type === 'Tabungan') {
                    document.getElementById('tx-to-wallet-tab').value = tx.toWalletId;
                    document.getElementById('tx-target-tab').value = tx.category;
                    document.getElementById('tx-fee-tab').value = tx.fee || 0;
                    if (document.getElementById('tx-link-goal-toggle')) {
                        document.getElementById('tx-link-goal-toggle').checked = !!tx.linkedGoalId;
                    }
                    window.handleLinkGoalToggleDirect(!!tx.linkedGoalId);
                } else if (tx.type === 'Transfer') {
                    document.getElementById('tx-to-wallet-tf').value = tx.toWalletId;
                    document.getElementById('tx-fee-tf').value = tx.fee || 0;
                }
            }
        } else {
            if (type === 'Tabungan') {
                const targetWalletInput = document.getElementById('tx-to-wallet-tab');
                if (targetWalletInput) {
                    window.handleToWalletChangeDirect(targetWalletInput.value);
                }
            }
        }
    };

    window.closeTxModal = function() {
        state.txModal.show = false;
        render();
    };

    window.switchTxTab = function(tabName) {
        if (state.txModal.editMode) return;
        state.txModal.activeTab = tabName;
        state.txModal.linkToGoal = false;
        state.txModal.linkedGoalId = '';
        render();

        if (tabName === 'Tabungan') {
            const targetWalletInput = document.getElementById('tx-to-wallet-tab');
            if (targetWalletInput) {
                window.handleToWalletChangeDirect(targetWalletInput.value);
            }
        }
    };

    window.saveTransaction = function(e) {
        e.preventDefault();
        const date = document.getElementById('tx-date').value;
        const amount = parseFloat(document.getElementById('tx-amount').value) || 0;
        const walletId = document.getElementById('tx-wallet').value;
        const notes = document.getElementById('tx-notes').value.trim();
        const type = state.txModal.activeTab;

        if (amount <= 0) {
            showToast('Jumlah transaksi harus lebih besar dari 0!');
            return;
        }

        let category = '';
        let toWalletId = '';
        let fee = 0;
        let linkedGoalId = '';

        if (type === 'Pengeluaran') {
            category = document.getElementById('tx-cat-exp').value;
        } else if (type === 'Pemasukan') {
            category = document.getElementById('tx-source').value;
        } else if (type === 'Tabungan') {
            toWalletId = document.getElementById('tx-to-wallet-tab').value;
            category = document.getElementById('tx-target-tab').value;
            fee = parseFloat(document.getElementById('tx-fee-tab').value) || 0;
            if (state.txModal.linkToGoal) {
                const goalSelect = document.getElementById('tx-linked-goal-id');
                if (goalSelect) {
                    linkedGoalId = goalSelect.value;
                }
            }
        } else if (type === 'Transfer') {
            toWalletId = document.getElementById('tx-to-wallet-tf').value;
            fee = parseFloat(document.getElementById('tx-fee-tf').value) || 0;
            category = 'Transfer';
            if (walletId === toWalletId) {
                showToast('Dompet asal dan tujuan tidak boleh sama!');
                return;
            }
        }

        const txData = {
            id: state.txModal.editMode ? state.txModal.txId : 'tx_' + Date.now(),
            date, amount, walletId, toWalletId, fee, type, category, notes, linkedGoalId
        };

        if (state.txModal.editMode) {
            const oldTx = state.transactions.find(t => t.id === state.txModal.txId);
            if (oldTx) revertTransactionImpact(oldTx);
            const idx = state.transactions.findIndex(t => t.id === state.txModal.txId);
            state.transactions[idx] = txData;
            applyTransactionImpact(txData);
            showToast('Transaksi berhasil diperbarui!');
        } else {
            state.transactions.unshift(txData);
            applyTransactionImpact(txData);
            showToast('Transaksi baru berhasil ditambahkan!');
        }

        saveStateToFirebase();
        state.txModal.show = false;
        render();
    };

    window.toggleTxExpand = function(id) {
        state.selectedTransactionId = (state.selectedTransactionId === id) ? null : id;
        render();
    };

    window.triggerDeleteTx = function(id, e) {
        e.stopPropagation();
        const tx = state.transactions.find(t => t.id === id);
        if (tx) {
            state.confirmDialog = {
                show: true, title: 'Hapus Transaksi',
                message: `Hapus transaksi "${tx.notes || tx.category}" senilai ${formatRp(tx.amount)}?`,
                actionType: 'deleteTx', targetId: id
            };
            render();
        }
    };

    // --- STREAMING_CHUNK: Bulk / Mass Input Transactions... ---
    window.openBulkModal = function() {
        if (state.wallets.length === 0) {
            state.bulkModal.rows = [];
        } else {
            state.bulkModal.rows = [
                { id: 1, date: new Date().toISOString().split('T')[0], amount: 0, type: 'Pengeluaran', walletId: state.wallets[0]?.id || '', category: 'F&B', notes: '' },
                { id: 2, date: new Date().toISOString().split('T')[0], amount: 0, type: 'Pengeluaran', walletId: state.wallets[0]?.id || '', category: 'F&B', notes: '' },
                { id: 3, date: new Date().toISOString().split('T')[0], amount: 0, type: 'Pengeluaran', walletId: state.wallets[0]?.id || '', category: 'F&B', notes: '' }
            ];
        }
        state.bulkModal.show = true;
        render();
    };

    window.closeBulkModal = function() {
        state.bulkModal.show = false;
        render();
    };

    window.addBulkRow = function() {
        const nextId = state.bulkModal.rows.length ? Math.max(...state.bulkModal.rows.map(r => r.id)) + 1 : 1;
        const lastRow = state.bulkModal.rows[state.bulkModal.rows.length - 1] || {};
        state.bulkModal.rows.push({
            id: nextId, date: lastRow.date || new Date().toISOString().split('T')[0],
            amount: 0, type: lastRow.type || 'Pengeluaran',
            walletId: lastRow.walletId || state.wallets[0]?.id || '',
            category: lastRow.category || 'F&B', notes: ''
        });
        render();
    };

    window.removeBulkRow = function(id) {
        state.bulkModal.rows = state.bulkModal.rows.filter(r => r.id !== id);
        render();
    };

    window.handleBulkRowChange = function(id, field, value) {
        const row = state.bulkModal.rows.find(r => r.id === id);
        if (row) {
            row[field] = value;
            if (field === 'type') {
                if (value === 'Pengeluaran') row.category = 'F&B';
                else if (value === 'Pemasukan') row.category = 'Gaji';
                else if (value === 'Tabungan') row.category = 'Tabungan';
                else row.category = 'Transfer';
            }
            render();
        }
    };

    window.saveBulkTransactions = function() {
        let validCount = 0;
        state.bulkModal.rows.forEach(row => {
            const amount = parseFloat(row.amount) || 0;
            if (amount > 0) {
                const txData = {
                    id: 'tx_bulk_' + Date.now() + '_' + Math.random().toString(36).substring(2, 5),
                    date: row.date, amount: amount, walletId: row.walletId,
                    toWalletId: row.type === 'Transfer' || row.type === 'Tabungan' ? state.wallets.find(w => w.id !== row.walletId)?.id || '' : '',
                    fee: 0, type: row.type, category: row.category, notes: row.notes.trim()
                };
                state.transactions.unshift(txData);
                applyTransactionImpact(txData);
                validCount++;
            }
        });

        saveStateToFirebase();
        state.bulkModal.show = false;
        showToast(`${validCount} Transaksi massal berhasil disimpan!`);
        render();
    };

    // --- SISA LOGIK DAN RENDER DIJALANKAN DI SINI ---
    function renderPlaceholderView() {
        return `
            <div class="flex-1 flex flex-col items-center justify-center text-center p-8 animate-fade-in">
                <div class="w-16 h-16 bg-brand-limeLight rounded-full flex items-center justify-center text-2xl mb-4 text-brand-textDark shadow-sm">
                    <i class="fa-solid fa-hourglass-half animate-pulse"></i>
                </div>
                <h2 class="font-heading font-bold text-xl mb-1 text-slate-900">Modul Sedang Dikembangkan</h2>
                <p class="text-brand-textMuted text-xs max-w-sm font-sans">
                    Modul untuk menu <span class="font-bold text-brand-textDark capitalize font-sans">"${state.activeMenu}"</span> sedang dipersiapkan. Gunakan menu navigasi utama untuk mengelola aliran finansial Anda.
                </p>
            </div>
        `;
    }

    function render() {
        const app = document.getElementById('app');
        if (app) {
            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center bg-slate-100 p-6">
                    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md text-center">
                        <h1 class="font-heading font-bold text-2xl text-slate-800 mb-2">Budggt Connected</h1>
                        <p class="text-xs text-brand-textMuted mb-6">Data tersimpan aman dan sinkron dengan Firebase Realtime Database Anda.</p>
                        <div class="flex gap-2">
                           <button onclick="openModal('add')" class="flex-1 bg-brand-lime hover:bg-brand-limeDark text-brand-textDark font-bold py-2.5 rounded-xl text-xs shadow-sm transition-all">
                              + Tambah Dompet
                           </button>
                           <button onclick="openTxModal('Pengeluaran')" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded-xl text-xs shadow-sm transition-all">
                              + Transaksi baru
                           </button>
                        </div>
                        <div class="mt-6 text-left">
                            <h3 class="font-bold text-sm text-slate-700 mb-2">Dompet Anda (${state.wallets.length})</h3>
                            <ul class="text-xs text-slate-600 space-y-1">
                                ${state.wallets.map(w => `<li>• <b>${w.name}</b> (${w.type}): ${formatRp(w.balance)}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    // --- MENJALANKAN INTEGRASI SAAT LOAD AWAL ---
    initFirebaseSync();
</script>

</body>
