<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budggt - Atur Dompet & Budget Anda</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // --- STREAMING_CHUNK: Configuring Tailwind custom brand colors... ---
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            lime: '#bcfd1c',
                            limeLight: '#f4ffd4',
                            limeDark: '#a3db10',
                            textDark: '#0f172a',
                            textMuted: '#64748b',
                            bgLight: '#f8fafc',
                            border: '#f1f5f9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* Custom scrollbar styling for premium look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-brand-bgLight text-brand-textDark font-sans antialiased overflow-hidden">

    <!-- ROOT CONTAINER MOUNT POINT -->
    <div id="app" class="min-h-screen flex overflow-hidden"></div>

    <script>
    // --- STREAMING_CHUNK: Initializing pristine clean state... ---
    let state = {
        activeMenu: 'dashboard', // Default ke Dashboard

        // Data murni bersih tanpa dummy
        wallets: [],
        transactions: [],
        goals: [],
        debts: [],
        
        selectedWalletId: null,
        selectedTransactionId: null, 
        activeSubcategoryMenuId: null, 
        
        // Filter Pencarian
        transactionSearch: '',
        filterTime: 'Semua Waktu',
        filterWallet: 'Semua Dompet',
        filterType: 'Semua Tipe',
        filterCategory: 'Semua Subkategori',

        // Kategori Default
        categoriesExpense: ['F&B', 'Grocery', 'Tagihan', 'Kuota', 'Transportasi', 'Iuran', 'Jajan', 'Online Shopping', 'Pet', 'Kebutuhan Anak', 'Lain-lain'],
        sourcesIncome: ['Gaji', 'Tukin', 'Uang Makan', 'Uang Dinas', 'Lain-lain'],
        savingTargets: ['Tabungan', 'Deposito', 'Reksadana', 'Obligasi', 'Saham', 'SBN'],

        categoryEmojis: {
            'F&B': '🍔', 'Grocery': '🛒', 'Tagihan': '💵', 'Kuota': '📱', 'Transportasi': '🚗',
            'Iuran': '🤝', 'Jajan': '🍦', 'Online Shopping': '🛍️', 'Pet': '🐱', 'Kebutuhan Anak': '🍼',
            'Lain-lain': '📦', 'Gaji': '💰', 'Tukin': '💸', 'Uang Makan': '🍱', 'Uang Dinas': '✈️',
            'Tabungan': '🐷', 'Deposito': '🏦', 'Reksadana': '📈', 'Obligasi': '📝', 'Saham': '📊', 'SBN': '🏛️'
        },

        budget: {
            incomeEstimate: 0, 
            selectedMonth: '2026-07', // Sinkron dengan bulan aktif Juli 2026
            kebutuhanPct: 50, 
            keinginanPct: 30, 
            tabunganPct: 20,  
            subcategories: [] 
        },

        // Modal Wizard states
        modal: { show: false, mode: 'add', walletId: null },
        txModal: { show: false, activeTab: 'Pengeluaran', editMode: false, txId: null, linkToGoal: false, linkedGoalId: '' },
        bulkModal: { show: false, rows: [] },
        budgetModal: { show: false, mode: 'estimate' },
        tempBudgetModal: { kebutuhanPct: 50, keinginanPct: 30, tabunganPct: 20, selectedParentCategory: 'kebutuhan', editingSubId: null, editingSubName: '', editingSubLimit: 0 },
        
        goalModal: { show: false, mode: 'add', goalId: null },
        goalDetailId: null,

        debtModal: { show: false, mode: 'add', type: 'utang', debtId: null },

        confirmDialog: { show: false, title: '', message: '', actionType: '', targetId: null, extraId: null },
        toastMessage: null
    };

    // --- STREAMING_CHUNK: Formatting & UI Helpers... ---
    const formatRp = (num) => {
        const isNegative = num < 0;
        const absVal = Math.abs(num);
        const formatted = new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0
        }).format(absVal);
        return (isNegative ? '-' : '') + formatted.replace("Rp", "Rp ").trim();
    };

    function showToast(message) {
        state.toastMessage = message;
        render();
        setTimeout(() => {
            state.toastMessage = null;
            render();
        }, 3000);
    }

    function getGoalEmojiByName(name) {
        const lowerName = name.toLowerCase();
        if (lowerName.includes('darurat') || lowerName.includes('emergency')) return '🚨';
        if (lowerName.includes('jogja') || lowerName.includes('jalan') || lowerName.includes('travel') || lowerName.includes('liburan') || lowerName.includes('bali')) return '🌲';
        if (lowerName.includes('mama') || lowerName.includes('ibu') || lowerName.includes('kado') || lowerName.includes('istri')) return '👩';
        if (lowerName.includes('sepeda') || lowerName.includes('motor')) return '🚲';
        if (lowerName.includes('emas') || lowerName.includes('logam') || lowerName.includes('gold')) return '🏅';
        if (lowerName.includes('rumah') || lowerName.includes('apartemen') || lowerName.includes('properti')) return '🏠';
        return '🎯';
    }

    document.addEventListener('click', () => {
        if (state.activeSubcategoryMenuId) {
            state.activeSubcategoryMenuId = null;
            render();
        }
    });

    window.switchMenu = function(menuId) {
        state.activeMenu = menuId;
        render();
    };

    // --- STREAMING_CHUNK: Dompet / Wallet Logic... ---
    window.toggleWalletExpand = function(id) {
        state.selectedWalletId = (state.selectedWalletId === id) ? null : id;
        render();
    };

    window.updateLastCheck = function(id, val, e) {
        e.stopPropagation();
        const wallet = state.wallets.find(w => w.id === id);
        if (wallet) {
            wallet.lastCheck = val;
            showToast(`Tanggal Last Check "${wallet.name}" diperbarui!`);
        }
    };

    window.triggerDeleteWallet = function(id, e) {
        e.stopPropagation();
        const wallet = state.wallets.find(w => w.id === id);
        if (wallet) {
            state.confirmDialog = {
                show: true, title: 'Hapus Dompet',
                message: `Apakah Anda yakin ingin menghapus dompet "${wallet.name}"? Semua data terkait akan terhapus.`,
                actionType: 'deleteWallet', targetId: id
            };
            render();
        }
    };

    window.openModal = function(mode, id = null, e = null) {
        if (e) e.stopPropagation();
        state.modal = { show: true, mode, walletId: id };
        render();

        if (mode === 'edit' && id) {
            const w = state.wallets.find(x => x.id === id);
            if (w) {
                document.getElementById('m-type').value = w.type;
                document.getElementById('m-name').value = w.name;
                document.getElementById('m-bal').value = Math.abs(w.balance);
                document.getElementById('m-acc').value = w.accountNumber || '';
                window.handleModalTypeChange(w.type);

                if (w.type === 'Bank') {
                    document.getElementById('m-res-n').value = w.reserveName || '';
                    document.getElementById('m-res-v').value = w.reserveAmount || '';
                } else if (w.type === 'Kartu Kredit' || w.type === 'PayLater') {
                    document.getElementById('m-lim').value = w.limit || '';
                    document.getElementById('m-due').value = w.dueDate || '';
                }
            }
        } else {
            window.handleModalTypeChange('Bank');
        }
    };

    window.closeModal = function() {
        state.modal.show = false;
        render();
    };

    window.handleModalTypeChange = function(selectedType) {
        const bankFields = document.getElementById('modal-bank-only-fields');
        const creditFields = document.getElementById('modal-credit-only-fields');
        
        if (selectedType === 'Bank') {
            if (bankFields) bankFields.classList.remove('hidden');
            if (creditFields) creditFields.classList.add('hidden');
        } else if (selectedType === 'Kartu Kredit' || selectedType === 'PayLater') {
            if (bankFields) bankFields.classList.add('hidden');
            if (creditFields) creditFields.classList.remove('hidden');
        } else {
            if (bankFields) bankFields.classList.add('hidden');
            if (creditFields) creditFields.classList.add('hidden');
        }
    };

    window.saveWallet = function(e) {
        e.preventDefault();
        const type = document.getElementById('m-type').value;
        let bal = parseFloat(document.getElementById('m-bal').value) || 0;
        
        if (type === 'Kartu Kredit' || type === 'PayLater') {
            bal = -Math.abs(bal);
        }

        const data = {
            type: type,
            name: document.getElementById('m-name').value.trim(),
            balance: bal,
            accountNumber: document.getElementById('m-acc').value.trim(),
            lastCheck: new Date().toISOString().split('T')[0]
        };

        if (type === 'Bank') {
            data.reserveName = document.getElementById('m-res-n').value.trim();
            data.reserveAmount = parseFloat(document.getElementById('m-res-v').value) || 0;
            data.limit = 0; data.dueDate = '';
        } else if (type === 'Kartu Kredit' || type === 'PayLater') {
            data.limit = parseFloat(document.getElementById('m-lim').value) || 0;
            data.dueDate = document.getElementById('m-due').value.trim();
            data.reserveName = ''; data.reserveAmount = 0;
        } else {
            data.reserveName = ''; data.reserveAmount = 0; data.limit = 0; data.dueDate = '';
        }

        if (state.modal.mode === 'add') {
            data.id = 'w_' + Date.now();
            state.wallets.push(data);
            showToast(`Dompet "${data.name}" berhasil ditambahkan!`);
        } else {
            const idx = state.wallets.findIndex(x => x.id === state.modal.walletId);
            if (idx !== -1) {
                state.wallets[idx] = { ...state.wallets[idx], ...data };
                showToast(`Detail dompet "${data.name}" diperbarui!`);
            }
        }
        
        state.modal.show = false;
        render();
    };

    window.cancelConfirm = function() {
        state.confirmDialog.show = false;
        render();
    };

    window.executeConfirm = function() {
        const { actionType, targetId } = state.confirmDialog;
        
        if (actionType === 'deleteWallet') {
            state.wallets = state.wallets.filter(w => w.id !== targetId);
            state.selectedWalletId = null;
            showToast('Dompet berhasil dihapus.');
        } else if (actionType === 'deleteTx') {
            const tx = state.transactions.find(t => t.id === targetId);
            if (tx) revertTransactionImpact(tx);
            state.transactions = state.transactions.filter(t => t.id !== targetId);
            state.selectedTransactionId = null;
            showToast('Transaksi berhasil dihapus.');
        } else if (actionType === 'deleteSub') {
            state.budget.subcategories = state.budget.subcategories.filter(s => s.id !== targetId);
            showToast('Subkategori anggaran berhasil dihapus.');
        } else if (actionType === 'deleteGoal') {
            state.goals = state.goals.filter(g => g.id !== targetId);
            state.goalDetailId = null;
            showToast('Goal berhasil dihapus.');
        } else if (actionType === 'deleteDebt') {
            state.debts = state.debts.filter(d => d.id !== targetId);
            showToast('Catatan utang/piutang berhasil dihapus.');
        }
        
        state.confirmDialog.show = false;
        render();
    };

    // --- STREAMING_CHUNK: Transaction balance calculations... ---
    function applyTransactionImpact(tx) {
        if (tx.type === 'Pengeluaran') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance -= tx.amount;
        } else if (tx.type === 'Pemasukan') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance += tx.amount;
        } else if (tx.type === 'Transfer' || tx.type === 'Tabungan') {
            const wFrom = state.wallets.find(x => x.id === tx.walletId);
            const wTo = state.wallets.find(x => x.id === tx.toWalletId);
            if (wFrom) wFrom.balance -= tx.amount;
            if (wTo) wTo.balance += tx.amount;
            if (tx.fee && wFrom) wFrom.balance -= tx.fee;

            if (tx.type === 'Tabungan' && tx.linkedGoalId) {
                const goal = state.goals.find(g => g.id === tx.linkedGoalId);
                if (goal && !goal.isLocked) {
                    goal.current += tx.amount;
                }
            }
        }
    }

    function revertTransactionImpact(tx) {
        if (tx.type === 'Pengeluaran') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance += tx.amount;
        } else if (tx.type === 'Pemasukan') {
            const w = state.wallets.find(x => x.id === tx.walletId);
            if (w) w.balance -= tx.amount;
        } else if (tx.type === 'Transfer' || tx.type === 'Tabungan') {
            const wFrom = state.wallets.find(x => x.id === tx.walletId);
            const wTo = state.wallets.find(x => x.id === tx.toWalletId);
            if (wFrom) wFrom.balance += tx.amount;
            if (wTo) wTo.balance -= tx.amount;
            if (tx.fee && wFrom) wFrom.balance += tx.fee;

            if (tx.type === 'Tabungan' && tx.linkedGoalId) {
                const goal = state.goals.find(g => g.id === tx.linkedGoalId);
                if (goal) goal.current = Math.max(0, goal.current - tx.amount);
            }
        }
    }

    window.handleToWalletChangeDirect = function(selectedToWalletId) {
        const container = document.getElementById('linked-goal-select-container');
        if (!container) return;

        const matchingGoals = state.goals.filter(g => g.walletId === selectedToWalletId);

        if (matchingGoals.length === 0) {
            container.innerHTML = `
                <p class="text-xs text-red-500 italic mt-2 text-center bg-red-50 py-2 rounded-xl border border-red-100 font-semibold">
                    Tidak ada goal aktif untuk dompet ini
                </p>
            `;
        } else {
            container.innerHTML = `
                <label class="text-[10px] font-bold tracking-wider text-brand-textMuted block mb-1">TAUTKAN KE TARGET GOAL</label>
                <select 
                    id="tx-linked-goal-id" required
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none cursor-pointer font-semibold"
                >
                    ${matchingGoals.map(g => `<option value="${g.id}" ${state.txModal.linkedGoalId === g.id ? 'selected' : ''}>${g.emoji} ${g.name} (${formatRp(g.current)} / ${formatRp(g.target)})</option>`).join('')}
                </select>
            `;
        }
    };

    window.handleLinkGoalToggleDirect = function(checked) {
        state.txModal.linkToGoal = checked;
        const wrapper = document.getElementById('tx-linked-goal-wrapper');
        if (!wrapper) return;

        if (checked) {
            wrapper.classList.remove('hidden');
            const targetWalletInput = document.getElementById('tx-to-wallet-tab');
            if (targetWalletInput) {
                window.handleToWalletChangeDirect(targetWalletInput.value);
            }
        } else {
            wrapper.classList.add('hidden');
        }
    };

    // --- STREAMING_CHUNK: Tx Modals Wizard... ---
    window.openTxModal = function(type = 'Pengeluaran', editId = null) {
        state.txModal = {
            show: true, activeTab: type, editMode: !!editId, txId: editId,
            linkToGoal: false, linkedGoalId: ''
        };
        render();

        const todayStr = new Date().toISOString().split('T')[0];
        if (document.getElementById('tx-date')) {
            document.getElementById('tx-date').value = todayStr;
        }

        if (editId) {
            const tx = state.transactions.find(t => t.id === editId);
            if (tx) {
                state.txModal.activeTab = tx.type;
                state.txModal.linkToGoal = !!tx.linkedGoalId;
                state.txModal.linkedGoalId = tx.linkedGoalId || '';
                render(); 
                document.getElementById('tx-date').value = tx.date;
                document.getElementById('tx-amount').value = tx.amount;
                document.getElementById('tx-wallet').value = tx.walletId;
                document.getElementById('tx-notes').value = tx.notes || '';
                
                if (tx.type === 'Pengeluaran') {
                    document.getElementById('tx-cat-exp').value = tx.category;
                } else if (tx.type === 'Pemasukan') {
                    document.getElementById('tx-source').value = tx.category;
                } else if (tx.type === 'Tabungan') {
                    document.getElementById('tx-to-wallet-tab').value = tx.toWalletId;
                    document.getElementById('tx-target-tab').value = tx.category;
                    document.getElementById('tx-fee-tab').value = tx.fee || 0;
                    if (document.getElementById('tx-link-goal-toggle')) {
                        document.getElementById('tx-link-goal-toggle').checked = !!tx.linkedGoalId;
                    }
                    window.handleLinkGoalToggleDirect(!!tx.linkedGoalId);
                } else if (tx.type === 'Transfer') {
                    document.getElementById('tx-to-wallet-tf').value = tx.toWalletId;
                    document.getElementById('tx-fee-tf').value = tx.fee || 0;
                }
            }
        } else {
            if (type === 'Tabungan') {
                const targetWalletInput = document.getElementById('tx-to-wallet-tab');
                if (targetWalletInput) {
                    window.handleToWalletChangeDirect(targetWalletInput.value);
                }
            }
        }
    };

    window.closeTxModal = function() {
        state.txModal.show = false;
        render();
    };

    window.switchTxTab = function(tabName) {
        if (state.txModal.editMode) return;
        state.txModal.activeTab = tabName;
        state.txModal.linkToGoal = false;
        state.txModal.linkedGoalId = '';
        render();

        if (tabName === 'Tabungan') {
            const targetWalletInput = document.getElementById('tx-to-wallet-tab');
            if (targetWalletInput) {
                window.handleToWalletChangeDirect(targetWalletInput.value);
            }
        }
    };

    window.saveTransaction = function(e) {
        e.preventDefault();
        const date = document.getElementById('tx-date').value;
        const amount = parseFloat(document.getElementById('tx-amount').value) || 0;
        const walletId = document.getElementById('tx-wallet').value;
        const notes = document.getElementById('tx-notes').value.trim();
        const type = state.txModal.activeTab;

        if (amount <= 0) {
            showToast('Jumlah transaksi harus lebih besar dari 0!');
            return;
        }

        let category = '';
        let toWalletId = '';
        let fee = 0;
        let linkedGoalId = '';

        if (type === 'Pengeluaran') {
            category = document.getElementById('tx-cat-exp').value;
        } else if (type === 'Pemasukan') {
            category = document.getElementById('tx-source').value;
        } else if (type === 'Tabungan') {
            toWalletId = document.getElementById('tx-to-wallet-tab').value;
            category = document.getElementById('tx-target-tab').value;
            fee = parseFloat(document.getElementById('tx-fee-tab').value) || 0;
            if (state.txModal.linkToGoal) {
                const goalSelect = document.getElementById('tx-linked-goal-id');
                if (goalSelect) {
                    linkedGoalId = goalSelect.value;
                }
            }
        } else if (type === 'Transfer') {
            toWalletId = document.getElementById('tx-to-wallet-tf').value;
            fee = parseFloat(document.getElementById('tx-fee-tf').value) || 0;
            category = 'Transfer';
            if (walletId === toWalletId) {
                showToast('Dompet asal dan tujuan tidak boleh sama!');
                return;
            }
        }

        const txData = {
            id: state.txModal.editMode ? state.txModal.txId : 'tx_' + Date.now(),
            date, amount, walletId, toWalletId, fee, type, category, notes, linkedGoalId
        };

        if (state.txModal.editMode) {
            const oldTx = state.transactions.find(t => t.id === state.txModal.txId);
            if (oldTx) revertTransactionImpact(oldTx);
            const idx = state.transactions.findIndex(t => t.id === state.txModal.txId);
            state.transactions[idx] = txData;
            applyTransactionImpact(txData);
            showToast('Transaksi berhasil diperbarui!');
        } else {
            state.transactions.unshift(txData);
            applyTransactionImpact(txData);
            showToast('Transaksi baru berhasil ditambahkan!');
        }

        state.txModal.show = false;
        render();
    };

    window.toggleTxExpand = function(id) {
        state.selectedTransactionId = (state.selectedTransactionId === id) ? null : id;
        render();
    };

    window.triggerDeleteTx = function(id, e) {
        e.stopPropagation();
        const tx = state.transactions.find(t => t.id === id);
        if (tx) {
            state.confirmDialog = {
                show: true, title: 'Hapus Transaksi',
                message: `Hapus transaksi "${tx.notes || tx.category}" senilai ${formatRp(tx.amount)}?`,
                actionType: 'deleteTx', targetId: id
            };
            render();
        }
    };

    // --- STREAMING_CHUNK: Bulk / Mass Input Transactions... ---
    window.openBulkModal = function() {
        if (state.wallets.length === 0) {
            state.bulkModal.rows = [];
        } else {
            state.bulkModal.rows = [
                { id: 1, date: new Date().toISOString().split('T')[0], amount: 0, type: 'Pengeluaran', walletId: state.wallets[0]?.id || '', category: 'F&B', notes: '' },
                { id: 2, date: new Date().toISOString().split('T')[0], amount: 0, type: 'Pengeluaran', walletId: state.wallets[0]?.id || '', category: 'F&B', notes: '' },
                { id: 3, date: new Date().toISOString().split('T')[0], amount: 0, type: 'Pengeluaran', walletId: state.wallets[0]?.id || '', category: 'F&B', notes: '' }
            ];
        }
        state.bulkModal.show = true;
        render();
    };

    window.closeBulkModal = function() {
        state.bulkModal.show = false;
        render();
    };

    window.addBulkRow = function() {
        const nextId = state.bulkModal.rows.length ? Math.max(...state.bulkModal.rows.map(r => r.id)) + 1 : 1;
        const lastRow = state.bulkModal.rows[state.bulkModal.rows.length - 1] || {};
        state.bulkModal.rows.push({
            id: nextId, date: lastRow.date || new Date().toISOString().split('T')[0],
            amount: 0, type: lastRow.type || 'Pengeluaran',
            walletId: lastRow.walletId || state.wallets[0]?.id || '',
            category: lastRow.category || 'F&B', notes: ''
        });
        render();
    };

    window.removeBulkRow = function(id) {
        state.bulkModal.rows = state.bulkModal.rows.filter(r => r.id !== id);
        render();
    };

    window.handleBulkRowChange = function(id, field, value) {
        const row = state.bulkModal.rows.find(r => r.id === id);
        if (row) {
            row[field] = value;
            if (field === 'type') {
                if (value === 'Pengeluaran') row.category = 'F&B';
                else if (value === 'Pemasukan') row.category = 'Gaji';
                else if (value === 'Tabungan') row.category = 'Tabungan';
                else row.category = 'Transfer';
            }
            render();
        }
    };

    window.saveBulkTransactions = function() {
        let validCount = 0;
        state.bulkModal.rows.forEach(row => {
            const amount = parseFloat(row.amount) || 0;
            if (amount > 0) {
                const txData = {

                    fee: 0, type: row.type, category: row.category, notes: row.notes.trim()
                };
                state.transactions.unshift(txData);

    function getFilteredTransactions() {
        return state.transactions.filter(tx => {
            const matchesSearch = !state.transactionSearch || 
                (tx.notes && tx.notes.toLowerCase().includes(state.transactionSearch.toLowerCase())) ||
                tx.category.toLowerCase().includes(state.transactionSearch.toLowerCase());
            
            let matchesWallet = true;
            if (state.filterWallet !== 'Semua Dompet') {
                matchesWallet = (tx.walletId === state.filterWallet || tx.toWalletId === state.filterWallet);
            }

            let matchesType = true;
            if (state.filterType !== 'Semua Tipe') {
                matchesType = (tx.type === state.filterType);
            }

            let matchesCategory = true;
            if (state.filterCategory !== 'Semua Subkategori') {
                matchesCategory = (tx.category === state.filterCategory);
            }

            let matchesTime = true;
            if (state.filterTime !== 'Semua Waktu') {
                const txDate = new Date(tx.date);
                const today = new Date();
                today.setHours(0,0,0,0);
                
                if (state.filterTime === 'Hari Ini') {
                    matchesTime = (tx.date === new Date().toISOString().split('T')[0]);
                } else if (state.filterTime === 'Minggu Ini') {
                    const oneWeekAgo = new Date();
                    oneWeekAgo.setDate(today.getDate() - 7);
                    matchesTime = (txDate >= oneWeekAgo);
                } else if (state.filterTime === 'Bulan Ini') {
                    matchesTime = (txDate.getMonth() === today.getMonth() && txDate.getFullYear() === today.getFullYear());
                }
            }

            return matchesSearch && matchesWallet && matchesType && matchesCategory && matchesTime;
        });
    }

    function getAccumulatedSpend(subName, type) {
        const targetMonth = state.budget.selectedMonth; 
        return state.transactions
            .filter(tx => {
                const txMonth = tx.date.substring(0, 7); 
                const matchesMonth = (txMonth === targetMonth);
                if (type === 'tabungan') {
                    return matchesMonth && tx.type === 'Tabungan' && tx.category === subName;
                } else {
                    return matchesMonth && tx.type === 'Pengeluaran' && tx.category === subName;
                }
            })
            .reduce((sum, tx) => sum + tx.amount, 0);
    }

    function getMonthRangeLabel(monthStr) {
        if (!monthStr) return '';
        const parts = monthStr.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1; 
        
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0); 
        
        const formatDay = (date) => {
            const day = String(date.getDate()).padStart(2, '0');
            const monthsShort = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            return `${day} ${monthsShort[date.getMonth()]}`;
        };

        return `${formatDay(firstDay)} - ${formatDay(lastDay)}`;
    }

    function calculateMonthlySaving(goal) {
        const remaining = goal.target - goal.current;
        if (remaining <= 0) return 0;
        
        const now = new Date();
        const deadline = new Date(goal.deadline);
        const monthsDiff = (deadline.getFullYear() - now.getFullYear()) * 12 + (deadline.getMonth() - now.getMonth());
        
        if (monthsDiff <= 0) return remaining; 
        return Math.round(remaining / monthsDiff);
    }

        const parts = selectedMonth.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]);

        // Hitung jumlah hari total dalam bulan yang dipilih
        const daysInMonth = new Date(year, month, 0).getDate();

        // 1. Budget per hari = perkiraan pemasukan / jumlah hari pada bulan tersebut
        const estimate = state.budget.incomeEstimate;
        const budgetPerDay = daysInMonth > 0 ? Math.round(estimate / daysInMonth) : 0;

        // Ambil tanggal hari ini (14 Juli 2026)
        const todayStr = '2026-07-14';
        
        // Pemasukan & Pengeluaran hari ini
        const pemasukanHariIni = state.transactions
            .filter(tx => tx.date === todayStr && tx.type === 'Pemasukan')
            .reduce((sum, tx) => sum + tx.amount, 0);

        const pengeluaranHariIni = state.transactions
            .filter(tx => tx.date === todayStr && tx.type === 'Pengeluaran')
            .reduce((sum, tx) => sum + tx.amount, 0);

        // Budget harian yang tersisa = Budget per hari + pemasukan hari ini - pengeluaran hari ini
        const sisaBudgetHarian = budgetPerDay + pemasukanHariIni - pengeluaranHariIni;
        const budgetPercent = budgetPerDay > 0 ? Math.min(Math.round((sisaBudgetHarian / budgetPerDay) * 100), 100) : 0;

        // 2. Progres pengeluaran kategori strategis (Kebutuhan, Keinginan, Tabungan) tanpa pesan status tambahan
        const kebutuhanSub = state.budget.subcategories.filter(s => s.categoryParent === 'kebutuhan');
        const keinginanSub = state.budget.subcategories.filter(s => s.categoryParent === 'keinginan');
        const tabunganSub = state.budget.subcategories.filter(s => s.categoryParent === 'tabungan');

        const kebutuhanAlloc = Math.round((state.budget.kebutuhanPct / 100) * estimate);
        const keinginanAlloc = Math.round((state.budget.keinginanPct / 100) * estimate);
        const tabunganAlloc = Math.round((state.budget.tabunganPct / 100) * estimate);

        const kebutuhanSpent = kebutuhanSub.reduce((sum, s) => sum + getAccumulatedSpend(s.name, 'kebutuhan'), 0);
        const keinginanSpent = keinginanSub.reduce((sum, s) => sum + getAccumulatedSpend(s.name, 'keinginan'), 0);
        const tabunganSpent = tabunganSub.reduce((sum, s) => sum + getAccumulatedSpend(s.name, 'tabungan'), 0);

        const kebPct = kebutuhanAlloc > 0 ? Math.min(Math.round((kebutuhanSpent / kebutuhanAlloc) * 100), 100) : 0;

    // --- STREAMING_CHUNK: Layout Render Engine... ---
    function render() {
        const app = document.getElementById('app');
        if (!app) return;
        
        const assets = state.wallets.filter(w => w.balance >= 0);
        const liabilities = state.wallets.filter(w => w.balance < 0);
        
        const totalAssets = assets.reduce((s, w) => s + w.balance, 0);
        const totalLiabilities = liabilities.reduce((s, w) => s + Math.abs(w.balance), 0);
        const netWorth = totalAssets - totalLiabilities;

        app.innerHTML = `
            <!-- Sidebar Navigation -->
            <aside class="w-64 bg-white border-r border-brand-border p-6 flex flex-col justify-between shrink-0 z-10">
                <div>
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 rounded-xl bg-brand-lime flex items-center justify-center font-black text-2xl shadow-sm text-brand-textDark font-heading">
                            B
                        </div>
                        <span class="font-heading font-extrabold text-2xl tracking-tight">Budggt.</span>
                    </div>
                    <nav class="space-y-1">
                        ${[
                            { id: 'dashboard', label: 'Dashboard', icon: 'fa-solid fa-house' },
                            { id: 'dompet', label: 'Dompet', icon: 'fa-solid fa-wallet' },
                            { id: 'trans', label: 'Trans', icon: 'fa-solid fa-arrow-right-arrow-left' },
                            { id: 'budget', label: 'Budget', icon: 'fa-solid fa-chart-pie' },
                            { id: 'goals', label: 'Goals', icon: 'fa-solid fa-bullseye' },
                            { id: 'utang', label: 'Utang', icon: 'fa-solid fa-hand-holding-dollar' }
                        ].map(item => `
                            <button
                                onclick="switchMenu('${item.id}')"
                                class="w-full flex items-center gap-3.5 px-4 py-3 rounded-xl text-left font-medium text-sm transition-all ${
                                    state.activeMenu === item.id 
                                        ? 'bg-brand-lime text-brand-textDark font-semibold shadow-sm' 
                                        : 'text-brand-textMuted hover:bg-brand-bgLight hover:text-brand-textDark'
                                }"
                            >
                                <i class="${item.icon} text-base"></i>
                                <span>${item.label}</span>
                            </button>
                        `).join('')}
                    </nav>
                </div>
                <div class="border-t border-brand-border pt-4">
                    <div class="flex items-center justify-between text-brand-textMuted text-xs">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-brand-lime flex items-center justify-center font-bold text-brand-textDark text-xs">
                                T
                            </div>
                            <span class="font-semibold text-brand-textDark">Trisna</span>
                        </div>
                        <span class="bg-brand-bgLight px-2 py-1 rounded text-[10px] font-bold">PRO</span>
                    </div>
                </div>
            </aside>

            <!-- Main Panel Space -->
            <main class="flex-1 p-8 overflow-y-auto flex flex-col justify-between bg-[#fafbfa] relative">
                
                <!-- Toast Notification -->
                ${state.toastMessage ? `
                    <div class="absolute top-5 right-5 bg-slate-900 text-white text-xs px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-2 z-50 transition-all duration-300">
                        <i class="fa-solid fa-circle-check text-[#bcfd1c]"></i>
                        <span>${state.toastMessage}</span>
                    </div>
                ` : ''}

                ${state.activeMenu === 'dashboard' ? renderDashboardView() : ''}
                ${state.activeMenu === 'dompet' ? renderDompetView(assets, liabilities, totalAssets, totalLiabilities, netWorth) : ''}
                ${state.activeMenu === 'trans' ? renderTransaksiView() : ''}
                ${state.activeMenu === 'budget' ? renderBudgetView() : ''}
                ${state.activeMenu === 'goals' ? renderGoalsView() : ''}
                ${state.activeMenu === 'utang' ? renderUtangView() : ''}
                ${state.activeMenu !== 'dashboard' && state.activeMenu !== 'dompet' && state.activeMenu !== 'trans' && state.activeMenu !== 'budget' && state.activeMenu !== 'goals' && state.activeMenu !== 'utang' ? renderPlaceholderView() : ''}

                <!-- Footer -->
                <div class="border-t border-slate-100/80 pt-3 text-center text-[10px] text-brand-textMuted mt-12">
                    Budggt App Prototype © 2026. Made with ❤️ for mindful saving.
                </div>
            </main>

            <!-- Render Modals & Dialogs -->
            ${state.modal.show ? renderModalMarkup() : ''}
            ${state.txModal.show ? renderTxModalMarkup() : ''}
            ${state.bulkModal.show ? renderBulkModalMarkup() : ''}
            ${state.budgetModal.show ? renderBudgetModalMarkup() : ''}
            ${state.goalModal.show ? renderGoalModalMarkup() : ''}
            ${state.goalDetailId ? renderGoalDetailModal() : ''}
            ${state.debtModal.show ? renderDebtModalMarkup() : ''}
            ${state.confirmDialog.show ? renderConfirmDialog() : ''}
        `;
    }

    // --- STREAMING_CHUNK: Wallets Rendering Views... ---
    function renderDompetView(assets, liabilities, totalAssets, totalLiabilities, netWorth) {
        return `
            <div class="space-y-6">
                <div class="flex justify-between items-center">
                    <div class="text-left">
                        <h1 class="font-heading font-extrabold text-3xl tracking-tight text-brand-textDark">Dompet</h1>

                    <button 
                        onclick="openModal('add')"
                        class="bg-brand-lime hover:bg-brand-limeDark text-brand-textDark font-bold px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-sm transition-all text-xs"
                    >
                        <i class="fa-solid fa-plus text-xs"></i>
                        Tambah Baru
                    </button>
                </div>

                <div class="grid grid-cols-3 gap-4 bg-white border border-brand-border p-5 rounded-2xl shadow-sm">

                        <h2 class="text-2xl font-black text-slate-900">${formatRp(netWorth)}</h2>

                    </div>
                    <div class="space-y-1 border-l border-brand-border pl-6 text-left">
                        <span class="text-[10px] font-extrabold tracking-wider text-brand-textMuted block uppercase">Saldo & Tabungan</span>
                        <h2 class="text-2xl font-black text-emerald-600">${formatRp(totalAssets)}</h2>

                    </div>
                    <div class="space-y-1 border-l border-brand-border pl-6 text-left">
                        <span class="text-[10px] font-extrabold tracking-wider text-brand-textMuted block uppercase">Kewajiban & Kredit</span>
                        <h2 class="text-2xl font-black text-red-500">-${formatRp(totalLiabilities)}</h2>
                        <p class="text-[10px] text-red-400">Total Tagihan & Cicilan Aktif</p>
                    </div>
                </div>

                ${state.wallets.length === 0 ? `
                    <div class="flex flex-col items-center justify-center p-12 bg-white rounded-2xl border border-dashed border-slate-200 min-h-[320px] shadow-sm">
                        <div class="w-16 h-16 rounded-full bg-brand-limeLight flex items-center justify-center mb-4">
                            <i class="fa-solid fa-wallet text-brand-limeDark text-2xl"></i>
                        </div>

                        <p class="text-slate-400 text-xs mt-1 text-center max-w-sm">Mulai kelola keuangan Anda dengan menambahkan rekening bank, cash saku, investasi, atau kartu kredit pertama Anda.</p>
                        <button 
                            onclick="openModal('add')"
                            class="mt-5 bg-brand-lime hover:bg-brand-limeDark text-brand-textDark font-bold px-5 py-2.5 rounded-xl text-xs shadow-sm transition-all"
                        >
                            <i class="fa-solid fa-plus text-[10px] mr-1.5"></i> Tambah Dompet Pertama
                        </button>
                    </div>
                ` : `
                    <div>
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-brand-border">
                            <span class="font-bold text-xs tracking-wider text-brand-textMuted flex items-center gap-1.5 uppercase">
                                <i class="fa-solid fa-circle-arrow-up text-emerald-500 text-xs"></i>
                                Aset Kas & Tabungan (${assets.length})
                            </span>
                            <span class="font-extrabold text-sm text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-md">
                                ${formatRp(totalAssets)}
                            </span>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            ${assets.map(w => renderWalletCard(w, false)).join('')}
                        </div>
                    </div>

                    <div class="mt-8">
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-brand-border">
                            <span class="font-bold text-xs tracking-wider text-brand-textMuted flex items-center gap-1.5 uppercase">
                                <i class="fa-solid fa-circle-arrow-down text-red-400 text-xs"></i>
                                Kewajiban & Kredit (${liabilities.length})
                            </span>
                            <span class="font-extrabold text-sm text-red-500 bg-red-50 px-2 py-0.5 rounded-md">
                                -${formatRp(totalLiabilities)}
                            </span>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            ${liabilities.map(w => renderWalletCard(w, true)).join('')}

            </div>
        `;
    }

    function renderWalletCard(w, isDark = false) {
        const isExpanded = state.selectedWalletId === w.id;
        const availableBalance = w.balance - (w.reserveAmount || 0);
        const absoluteBalance = Math.abs(w.balance);
        const utilizationPercent = w.limit ? Math.round((absoluteBalance / w.limit) * 100) : 0;

        let iconHtml = '<i class="fa-solid fa-wallet"></i>';
        let iconBg = 'bg-gray-100 text-gray-600';
        if (w.type === 'Bank') { iconHtml = '<i class="fa-solid fa-building-columns"></i>'; iconBg = 'bg-blue-50 text-blue-600'; }
        else if (w.type === 'E-Wallet') { iconHtml = '<i class="fa-solid fa-mobile-screen"></i>'; iconBg = 'bg-emerald-50 text-emerald-600'; }
        else if (w.type === 'Kartu Kredit') { iconHtml = '<i class="fa-solid fa-credit-card"></i>'; iconBg = 'bg-purple-50 text-purple-600'; }
        else if (w.type === 'PayLater') { iconHtml = '<i class="fa-solid fa-stopwatch"></i>'; iconBg = 'bg-indigo-50 text-indigo-600'; }
        else if (w.type === 'Tunai') { iconHtml = '<i class="fa-solid fa-money-bill-wave"></i>'; iconBg = 'bg-amber-50 text-amber-600'; }
        else if (w.type === 'Reksadana') { iconHtml = '<i class="fa-solid fa-chart-line"></i>'; iconBg = 'bg-teal-50 text-teal-600'; }
        else if (w.type === 'Saham') { iconHtml = '<i class="fa-solid fa-arrow-trend-up"></i>'; iconBg = 'bg-emerald-50 text-emerald-600'; }
        else if (w.type === 'Obligasi') { iconHtml = '<i class="fa-solid fa-file-invoice-dollar"></i>'; iconBg = 'bg-cyan-50 text-cyan-600'; }
        else if (w.type === 'Deposito') { iconHtml = '<i class="fa-solid fa-vault"></i>'; iconBg = 'bg-yellow-50 text-yellow-600'; }
        else if (w.type === 'SBN') { iconHtml = '<i class="fa-solid fa-landmark"></i>'; iconBg = 'bg-rose-50 text-rose-600'; }

        return `
            <div 
                onclick="toggleWalletExpand('${w.id}')"
                class="transition-all duration-300 rounded-xl border p-4 flex flex-col justify-between relative overflow-hidden ${
                    isExpanded 
                        ? (isDark ? 'bg-slate-900 border-slate-900 shadow-lg text-white col-span-1 h-auto' : 'bg-white border-brand-lime shadow-md ring-2 ring-brand-lime/10 col-span-1 h-auto') 
                        : (isDark ? 'bg-slate-800 border-slate-800 text-white hover:bg-slate-900 cursor-pointer h-32' : 'bg-white border-brand-border hover:border-slate-300 hover:shadow-sm cursor-pointer h-32')
                }"
            >
                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg ${isDark ? 'bg-slate-700 text-white' : iconBg} flex items-center justify-center text-sm shrink-0">
                            ${iconHtml}
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-sm tracking-tight leading-tight">${w.name}</h3>
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">${w.type}</span>
                        </div>
                    </div>
                    <span class="font-extrabold text-sm ${isDark ? 'text-red-400' : 'text-slate-900'}">
                        ${formatRp(w.balance)}
                    </span>
                </div>

                ${isExpanded ? `
                    <div class="mt-4 pt-4 border-t ${isDark ? 'border-slate-800' : 'border-slate-100'} space-y-4" onclick="event.stopPropagation()">
                        <div class="${isDark ? 'bg-slate-800/50' : 'bg-slate-50'} p-2.5 rounded-lg flex justify-between items-center">
                            <div class="flex flex-col text-left">
                                <span class="text-[9px] font-bold text-slate-400 tracking-wider">LAST CHECK</span>
                                <span class="text-[10px] ${isDark ? 'text-red-300' : 'text-emerald-600'} font-semibold">Tandai Saldo Terkini</span>
                            </div>
                            <div class="relative flex items-center bg-white border border-slate-200 rounded-md px-2 py-1 hover:border-slate-300 transition-colors">
                                <span class="text-[10px] font-bold text-slate-600 mr-2">
                                    <i class="fa-solid fa-calendar-days mr-1 text-slate-400"></i>
                                    ${w.lastCheck}
                                </span>
                                <input 
                                    type="date" value="${w.lastCheck}"
                                    onchange="updateLastCheck('${w.id}', this.value, event)"
                                    class="opacity-0 absolute inset-0 z-10 cursor-pointer"
                                />
                            </div>
                        </div>

                        ${w.type === 'Bank' ? `
                            <div class="text-left space-y-2">
                                ${w.accountNumber ? `
                                    <div>
                                        <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider block">Nomor Rekening</span>
                                        <span class="text-xs font-semibold text-slate-700">${w.accountNumber}</span>
                                    </div>
                                ` : ''}
                                ${w.reserveAmount > 0 ? `
                                    <div class="bg-amber-50/70 p-2.5 rounded-lg border border-amber-100 space-y-1.5">
                                        <div class="flex justify-between text-[11px]">
                                            <span class="text-amber-800 font-medium">Dicadangkan (${w.reserveName}):</span>
                                            <span class="font-bold text-amber-800">${formatRp(w.reserveAmount)}</span>
                                        </div>
                                        <div class="flex justify-between text-[11px] border-t border-amber-200/50 pt-1">
                                            <span class="font-semibold text-slate-600">Sisa Tersedia:</span>
                                            <span class="font-bold text-emerald-600">${formatRp(availableBalance)}</span>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        ` : ''}

                        ${(w.type === 'Kartu Kredit' || w.type === 'PayLater') ? `
                            <div class="text-left space-y-3">
                                <div class="grid grid-cols-2 gap-4 text-xs">
                                    <div>
                                        <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider block">Limit Kartu</span>
                                        <span class="font-semibold text-slate-200">${w.limit ? formatRp(w.limit) : 'Tanpa Limit'}</span>
                                    </div>
                                    <div>
                                        <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider block">Jatuh Tempo</span>
                                        <span class="font-semibold text-slate-200 font-sans">Tgl ${w.dueDate || '-'}</span>
                                    </div>
                                </div>
                                ${w.limit > 0 ? `
                                    <div class="space-y-1">
                                        <div class="flex justify-between text-[10px] text-slate-400">
                                            <span>Rasio Penggunaan Limit</span>
                                            <span class="${utilizationPercent > 70 ? 'text-red-400 font-bold' : 'text-slate-300'}">
                                                ${utilizationPercent}%
                                            </span>
                                        </div>
                                        <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                            <div 
                                                class="h-full rounded-full transition-all duration-500 ${utilizationPercent > 70 ? 'bg-red-500' : 'bg-brand-lime'}"
                                                style="width: ${Math.min(utilizationPercent, 100)}%"
                                            ></div>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        ` : ''}

                        <div class="flex gap-2 pt-1 text-xs">
                            <button 
                                onclick="openModal('edit', '${w.id}', event)"
                                class="flex-1 font-bold py-2 rounded-lg flex items-center justify-center gap-1.5 transition-all ${
                                    isDark 
                                        ? 'bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200' 
                                        : 'border border-slate-200 hover:border-slate-800 text-slate-700 hover:text-slate-900'
                                }"
                            >
                                <i class="fa-solid fa-pen-to-square"></i> Ubah
                            </button>
                            <button 
                                onclick="triggerDeleteWallet('${w.id}', event)"
                                class="border border-red-100 hover:bg-red-50 text-red-600 font-bold px-3 py-2 rounded-lg flex items-center justify-center gap-1 transition-all"
                            >
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                ` : `
                    <div class="flex justify-between items-center text-[10px] text-brand-textMuted mt-3 pt-2 border-t ${isDark ? 'border-slate-700/50' : 'border-slate-50'}">
                        <span class="flex items-center gap-1 ${isDark ? 'text-slate-400' : ''}">

                        <input

                        >
                            <option value="Semua Dompet">Semua Dompet</option>

                        <select

    function renderTransactionCard(tx) {
        const isExpanded = state.selectedTransactionId === tx.id;
        const wallet = state.wallets.find(w => w.id === tx.walletId);
        const toWallet = state.wallets.find(w => w.id === tx.toWalletId);
        const linkedGoal = tx.linkedGoalId ? state.goals.find(g => g.id === tx.linkedGoalId) : null;

        let iconClass = 'fa-solid fa-arrow-down text-red-500';
        let bgClass = 'bg-red-50';
        let amtSign = '-';
        let amtClass = 'text-red-500';

        if (tx.type === 'Pemasukan') {
            iconClass = 'fa-solid fa-arrow-up text-emerald-500';
            bgClass = 'bg-emerald-50';
            amtSign = '+';
            amtClass = 'text-emerald-500';
        } else if (tx.type === 'Tabungan') {
            iconClass = 'fa-solid fa-piggy-bank text-blue-500';
            bgClass = 'bg-blue-50';
            amtSign = '';
            amtClass = 'text-blue-500';
        } else if (tx.type === 'Transfer') {
            iconClass = 'fa-solid fa-arrow-right-arrow-left text-purple-500';
            bgClass = 'bg-purple-50';
            amtSign = '';
            amtClass = 'text-slate-600';
        }

        return `
            <div 
                onclick="toggleTxExpand('${tx.id}')"
                class="bg-white border rounded-xl p-4 transition-all hover:shadow-sm cursor-pointer ${
                    isExpanded ? 'border-brand-lime shadow-sm ring-1 ring-brand-lime/10' : 'border-slate-100'
                }"
            >
                <div class="flex justify-between items-center text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg ${bgClass} flex items-center justify-center text-sm">
                            <i class="${iconClass}"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm text-slate-800 leading-tight">${tx.notes || tx.category}</h4>
                            <div class="flex items-center gap-1.5 mt-0.5">
                                <span class="text-[9px] font-extrabold text-slate-400 tracking-wider bg-slate-50 px-1.5 py-0.5 rounded uppercase">${tx.category}</span>
                                <span class="text-[9px] font-bold text-slate-400">• ${wallet ? wallet.name : ''}</span>
                                ${linkedGoal ? `<span class="text-[9px] font-bold text-purple-600 bg-purple-50 px-1.5 py-0.5 rounded"><i class="fa-solid fa-bullseye mr-1"></i>Goal: ${linkedGoal.name}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <span class="font-extrabold text-sm ${amtClass}">
                        ${amtSign}${formatRp(tx.amount)}
                    </span>
                </div>

                ${isExpanded ? `
                    <div class="mt-4 pt-4 border-t border-slate-100 grid grid-cols-2 gap-4 text-xs" onclick="event.stopPropagation()">
                        <div class="space-y-2 text-left">
                            <div>
                                <span class="text-[9px] font-extrabold text-slate-400 block uppercase tracking-wider">
                                    ${tx.type === 'Pemasukan' ? 'DOMPET TUJUAN' : 'DOMPET ASAL'}
                                </span>
                                <span class="font-semibold text-slate-700">${wallet ? wallet.name : '-'}</span>
                            </div>
                            ${toWallet ? `
                                <div>
                                    <span class="text-[9px] font-extrabold text-slate-400 block uppercase tracking-wider">DOMPET TUJUAN</span>
                                    <span class="font-semibold text-slate-700">${toWallet.name}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="space-y-2 text-left">
                            <div>
                                <span class="text-[9px] font-extrabold text-slate-400 block uppercase tracking-wider">KATEGORI</span>
                                <span class="font-semibold text-slate-700">${tx.category}</span>
                            </div>
                            ${tx.fee ? `
                                <div>
                                    <span class="text-[9px] font-extrabold text-slate-400 block uppercase tracking-wider">BIAYA ADMIN</span>
                                    <span class="font-semibold text-slate-700">${formatRp(tx.fee)}</span>
                                </div>
                            ` : ''}
                        </div>

                        <div class="col-span-2 flex gap-3 pt-2 border-t border-slate-50">
                            <button 
                                onclick="openTxModal('${tx.type}', '${tx.id}')"
                                class="flex-1 border border-slate-200 hover:border-slate-800 text-slate-700 font-bold py-2 rounded-xl flex items-center justify-center gap-1.5 transition-all"
                            >
                                <i class="fa-solid fa-pen-to-square"></i> UBAH
                            </button>
                            <button 
                                onclick="triggerDeleteTx('${tx.id}', event)"
                                class="flex-1 border border-red-200 hover:bg-red-50 text-red-600 font-bold py-2 rounded-xl flex items-center justify-center gap-1.5 transition-all"
                            >
                                <i class="fa-solid fa-trash-can"></i> HAPUS
                            </button>
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
    }

    function renderBudgetView() {

        const selectedMonth = state.budget.selectedMonth;
        
        const kebutuhanAllocated = Math.round((state.budget.kebutuhanPct / 100) * estimate);
        const keinginanAllocated = Math.round((state.budget.keinginanPct / 100) * estimate);
        const tabunganAllocated = Math.round((state.budget.tabunganPct / 100) * estimate);

        const kebutuhanSubcategories = state.budget.subcategories.filter(s => s.categoryParent === 'kebutuhan');
        const keinginanSubcategories = state.budget.subcategories.filter(s => s.categoryParent === 'keinginan');
        const tabunganSubcategories = state.budget.subcategories.filter(s => s.categoryParent === 'tabungan');

        const kebutuhanSpentTotal = kebutuhanSubcategories.reduce((sum, s) => sum + getAccumulatedSpend(s.name, 'kebutuhan'), 0);
        const keinginanSpentTotal = keinginanSubcategories.reduce((sum, s) => sum + getAccumulatedSpend(s.name, 'keinginan'), 0);
        const tabunganSpentTotal = tabunganSubcategories.reduce((sum, s) => sum + getAccumulatedSpend(s.name, 'tabungan'), 0);

        return `
            <div class="space-y-6">
                <div class="flex justify-between items-center text-left">
                    <div>
                        <h1 class="font-heading font-extrabold text-3xl tracking-tight text-brand-textDark">Atur Budget</h1>
                        <p class="text-brand-textMuted text-xs mt-0.5">Alokasikan perkiraan pendapatan bulanan ke dalam subkategori strategis.</p>
                    </div>
                </div>

                <div class="bg-zinc-950 text-white p-6 rounded-3xl flex items-center justify-between shadow-lg relative overflow-hidden text-left border border-zinc-850">
                    <div class="space-y-2 z-10">
                        <div class="flex items-center gap-2 text-slate-400 text-xs font-bold tracking-wider">
                            <i class="fa-solid fa-wallet text-[#bcfd1c] text-[10px]"></i>
                            <span>PERKIRAAN PEMASUKAN</span>
                            <button onclick="openBudgetModal('estimate')" class="text-white hover:text-brand-lime transition-all focus:outline-none">
                                <i class="fa-solid fa-pen text-xs"></i>
                            </button>
                        </div>
                        <h2 class="text-3xl font-black tracking-tight text-white">${formatRp(estimate)}</h2>
                        <div class="flex gap-2">
                            <span class="bg-[#242424] text-[9px] text-[#bcfd1c] font-extrabold tracking-wider px-2 py-0.5 rounded-full uppercase">Berbasis Persentase</span>
                            <span class="bg-[#242424] text-[9px] text-slate-300 font-extrabold tracking-wider px-2 py-0.5 rounded-full uppercase">Bulanan</span>
                        </div>
                    </div>

                    <div class="space-y-2 text-right z-10">
                        <div class="text-slate-400 text-xs font-bold tracking-wider flex items-center justify-end gap-1.5">
                            <i class="fa-solid fa-calendar-check text-[10px]"></i>
                            <span>PERIODE AKTIF</span>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <input 
                                type="month" value="${selectedMonth}" 
                                onchange="handleMonthChange(this.value)"
                                class="bg-[#242424] text-white text-sm font-bold px-4 py-2 rounded-xl border border-slate-850 focus:outline-none focus:ring-1 focus:ring-brand-lime cursor-pointer"
                            />
                            <span class="text-[10px] text-[#bcfd1c] font-bold mt-1 tracking-wide">
                                ${getMonthRangeLabel(selectedMonth)}
                            </span>
                        </div>
                    </div>
                </div>

                <div class="space-y-8">
                    ${renderBudgetCategoryBlock('KEBUTUHAN', state.budget.kebutuhanPct, kebutuhanAllocated, kebutuhanSpentTotal, kebutuhanSubcategories, 'kebutuhan')}
                    ${renderBudgetCategoryBlock('KEINGINAN', state.budget.keinginanPct, keinginanAllocated, keinginanSpentTotal, keinginanSubcategories, 'keinginan')}
                    ${renderBudgetCategoryBlock('TABUNGAN', state.budget.tabunganPct, tabunganAllocated, tabunganSpentTotal, tabunganSubcategories, 'tabungan')}
                </div>
            </div>
        `;
    }

    function renderBudgetCategoryBlock(title, pct, allocated, spentTotal, subcategories, key) {
        const isOver = spentTotal > allocated;
        const usagePct = allocated > 0 ? Math.min(Math.round((spentTotal / allocated) * 100), 100) : 0;
        
        return `
            <div class="bg-white border border-brand-border rounded-2xl p-5 shadow-sm space-y-4">
                <div class="flex justify-between items-center pb-2 border-b border-slate-100 text-left">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full ${key === 'kebutuhan' ? 'bg-indigo-500' : key === 'keinginan' ? 'bg-amber-500' : 'bg-blue-500'}"></span>
                        <h3 class="font-heading font-extrabold text-base tracking-tight text-slate-900 uppercase">${title}</h3>
                        <span class="text-xs text-slate-400 font-bold">(${pct}%)</span>
                        <button onclick="openBudgetModal('percentage')" class="text-xs font-bold text-slate-400 hover:text-slate-800 border border-slate-200 hover:border-slate-400 px-2.5 py-0.5 rounded-lg transition-all ml-2 flex items-center gap-1">
                            <i class="fa-solid fa-sliders text-[10px]"></i> Ubah
                        </button>
                    </div>
                    <div class="text-right text-xs">
                        <span class="font-bold text-slate-400">BATAS ALOKASI:</span>
                        <span class="font-black text-slate-800 ml-1">${formatRp(allocated)}</span>
                    </div>
                </div>

                <div class="space-y-1.5 text-left">
                    <div class="flex justify-between text-[11px] text-slate-400">
                        <span>TERPAKAI: <strong class="${isOver ? 'text-red-500' : 'text-slate-700'}">${formatRp(spentTotal)}</strong></span>
                        <span>BATAS: <strong>${formatRp(allocated)}</strong></span>
                    </div>
                    <div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden">
                        <div class="h-full rounded-full transition-all duration-500 ${isOver ? 'bg-red-500' : 'bg-brand-limeDark'}" style="width: ${usagePct}%"></div>
                    </div>
                </div>

                ${subcategories.length === 0 ? `
                    <div class="flex flex-col items-center justify-center p-8 bg-slate-50/50 rounded-xl border border-dashed border-slate-200">
                        <span class="text-xs text-slate-400 font-medium">Belum ada alokasi anggaran subkategori.</span>
                        <button 
                            onclick="openBudgetModal('addSubcategory', '${key}')"
                            class="mt-2 text-[10px] font-black text-indigo-600 hover:text-indigo-800 uppercase tracking-wider flex items-center gap-1"
                        >
                            <i class="fa-solid fa-plus text-[9px]"></i> Tambah Subkategori
                        </button>
                    </div>
                ` : `
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        ${subcategories.map(sub => {
                            const spend = getAccumulatedSpend(sub.name, key);
                            const percent = sub.allocated > 0 ? Math.min(Math.round((spend / sub.allocated) * 100), 100) : 0;
                            const isSubOver = spend > sub.allocated;
                            const isMenuOpen = state.activeSubcategoryMenuId === sub.id;

                            return `
                                <div class="bg-[#fafbfa] border border-slate-100 rounded-xl p-4 flex flex-col justify-between hover:border-brand-lime hover:shadow-sm transition-all group">
                                    <div class="flex justify-between items-start mb-3">
                                        <div class="flex items-center gap-3 text-left">
                                            <div class="w-9 h-9 rounded-xl bg-white shadow-sm flex items-center justify-center text-lg shrink-0">
                                                ${sub.emoji}
                                            </div>
                                            <div class="text-left">
                                                <h4 class="font-bold text-xs text-slate-800 leading-tight">${sub.name}</h4>
                                                <span class="text-[9px] text-slate-400 font-semibold uppercase">Alokasi Bulan Ini</span>
                                            </div>
                                        </div>
                                        
                                        <div class="flex items-center gap-2 relative">
                                            <span class="text-xs font-black text-slate-800">${formatRp(spend)}</span>
                                            
                                            <div class="relative inline-block text-left" onclick="event.stopPropagation()">
                                                <button 
                                                    onclick="toggleSubcategoryMenu('${sub.id}', event)" 
                                                    class="p-1 hover:bg-slate-200 rounded-full transition-colors focus:outline-none"
                                                >
                                                    <i class="fa-solid fa-ellipsis-vertical text-slate-400 hover:text-slate-700 text-xs"></i>
                                                </button>
                                                
                                                <div class="absolute right-0 mt-1 w-24 bg-white border border-slate-100 rounded-xl shadow-lg z-30 py-1 text-[11px] ${isMenuOpen ? '' : 'hidden'}">
                                                    <button 
                                                        onclick="openEditSubcategoryModal('${sub.id}', event)" 
                                                        class="w-full text-left px-3 py-1.5 text-slate-700 hover:bg-slate-50 flex items-center gap-1.5 font-semibold"
                                                    >
                                                        <i class="fa-solid fa-pen text-[9px]"></i> Ubah
                                                    </button>
                                                    <button 
                                                        onclick="triggerDeleteSubcategory('${sub.id}', '${sub.name}', event)" 
                                                        class="w-full text-left px-3 py-1.5 text-red-600 hover:bg-red-50 flex items-center gap-1.5 font-semibold"
                                                    >
                                                        <i class="fa-solid fa-trash-can text-[9px]"></i> Hapus
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                        <div class="flex justify-between text-[9px] text-slate-400">
                                            <span>Terpakai</span>
                                            <span>dari ${formatRp(sub.allocated)}</span>
                                        </div>
                                        <div class="w-full bg-slate-200 h-1 rounded-full overflow-hidden">
                                            <div class="h-full rounded-full transition-all duration-500 ${isSubOver ? 'bg-red-500' : 'bg-indigo-500'}" style="width: ${percent}%"></div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}

                        <button 
                            onclick="openBudgetModal('addSubcategory', '${key}')"
                            class="border border-dashed border-slate-200 hover:border-slate-400 hover:bg-slate-50 rounded-xl p-4 flex flex-col items-center justify-center text-slate-400 hover:text-slate-700 transition-all gap-1.5"
                        >
                            <i class="fa-solid fa-plus text-sm"></i>
                            <span class="text-xs font-bold uppercase tracking-wider">Tambah Subkategori</span>
                        </button>
                    </div>
                `}
            </div>
        `;
    }
